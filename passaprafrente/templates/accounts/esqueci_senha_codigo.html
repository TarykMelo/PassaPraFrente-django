{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'accounts/esqueci_senha_codigo.css' %}">
    <title>Autenticação de dois fatores</title>
</head>

<div class="container-codigo">

    <img src="{% static 'accounts/Images/PassaPraFrente_logo.png' %}" alt="Logo" class="logo">

    <div class="card-codigo">

        <h1>VERIFICAÇÃO</h1>

        <p class="texto">
            Digite o código de 6 dígitos enviado para seu e-mail.
        </p>

        {% if erro %}
            <div class="mensagem-erro">
                {{ erro }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Código:</label>

            <input
                type="text"
                name="codigo_digitado"
                maxlength="6"
                placeholder="Ex: 123456"
                required
            >

            <button type="submit">
                Verificar Código
            </button>
        </form>

        <a href="{% url 'esqueci_senha' %}" class="voltar">
            Voltar
        </a>

    </div>

</div>
