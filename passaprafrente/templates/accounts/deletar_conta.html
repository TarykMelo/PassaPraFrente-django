{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Deletar conta</h1>
    <p style="color:red">Essa ação é irreversível!</p>

    {% if erro %}
        <p style="color:red">{{ erro }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="password" name="password" placeholder="Digite sua senha para confirmar">
        <button type="submit" class="delete">Confirmar exclusão</button>
        <a href="{% url 'modificar_dados' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
