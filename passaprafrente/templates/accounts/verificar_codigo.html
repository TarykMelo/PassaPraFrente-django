{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'accounts/2fa.css' %}">
    <title>Verificar código</title>
</head>

<div class="auth-container">

    <div class="logo-area">
        <img src="{% static 'accounts/Images/PassaPraFrente_logo.png' %}" alt="Logo">
    </div>

    <div class="card-auth">

        <h1>CONFIRMAR CÓDIGO</h1>

        <p class="descricao">
            Digite o código de 6 dígitos enviado para você.
            <br>
            O código expira em 10 minutos.
        </p>

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input
                type="text"
                name="codigo"
                maxlength="6"
                placeholder="000000"
                autocomplete="off"
                required
                class="input-codigo"
            >

            <button type="submit" class="btn-verde">
                Verificar
            </button>

        </form>

        <a href="{% url 'escolher_metodo_2fa' %}" class="link-voltar">
            Reenviar código
        </a>

    </div>

</div>
