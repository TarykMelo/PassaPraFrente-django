{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'accounts/cadastro.css' %}">
    <title>Área de cadastro</title>
</head>
<body>
    <div class="container">
        <img src="{% static 'accounts/Images/PassaPraFrente_logo.png' %}" alt="Logo PassaPraFrente"/>
        <form action="" method="POST">
            {% csrf_token %}
<div class="boxes">

                <div class="box"> 
                    <h1>CADASTRO</h1>
                    <div class="cadastro">
                        <label>
                            Email:<br/>
                            <input type="email" name="email" placeholder="Digite o email" class="{% if form.email.errors %}input-erro{% endif %}" required/>
                            {% for error in form.email.errors %}
                                <span class="erro">{{ error }}</span>
                            {% endfor %}
                        </label>
                        <label>
                            Senha:<br/>
                            <input type="password" name="password1" placeholder="Senha" class="{% if form.password1.errors %}input-erro{% endif %}" required/>
                            {% for error in form.password1.errors %}
                                <span class="erro">{{ error }}</span>
                            {% endfor %}
                        </label>
                        <label>
                            Confirme a senha:<br/>
                            <input type="password" name="password2" placeholder="Confirme a senha" class="{% if form.password2.errors %}input-erro{% endif %}" required/>
                            {% for error in form.password2.errors %}
                                <span class="erro">{{ error }}</span>
                            {% endfor %}
                        </label>
                        <label>
                            Nickname:<br/>
                            <input type="text" name="nickname" placeholder="Nickname" class="{% if form.nickname.errors %}input-erro{% endif %}" required/>
                            {% for error in form.nickname.errors %}
                                <span class="erro">{{ error }}</span>
                            {% endfor %}
                        </label>
                        <label>
                            Telefone:<br/>
                            <input type="tel" name="telefone" placeholder="Número de telefone" class="{% if form.telefone.errors %}input-erro{% endif %}" required/>
                            {% for error in form.telefone.errors %}
                                <span class="erro">{{ error }}</span>
                            {% endfor %}
                        </label>
                        <div class="cadastro_buttons">
                            <button type="submit">Fazer cadastro</button>
                            <button type="button" onclick="window.location.href='{% url 'login' %}'" class="back_login">Voltar</button>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </div>
</body>
</html>
