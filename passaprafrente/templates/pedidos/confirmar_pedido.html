{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'pedidos/confirmar_pedido.css' %}">
    <title>Confirmar pedido</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="image_area">
                {% if produto.imagem %}
                    <img src="{{ produto.imagem.url }}" alt="{{ produto.nome }}">
                {% endif %}
            </div>
            <div class="info_area">
                <h1>{{ produto.nome }}</h1>
                    <h2>R$ {{ produto.preco }}</h2>
                    <p>{{ produto.descricao }}</p>
                    <p><b>{{ produto.categoria }}</b></p>
                    <p><b>Telefone: </b>{{ produto.vendedor.telefone }}</p>
                    <P><b>Vendedor: </b>{{ produto.vendedor.nickname }}</P>
                    
                    <div class="info_area_buttons">
                        <form method="POST" style="flex: 1">
                            {% csrf_token %}
                            <button type="submit" style="width: 100%">Fazer pedido</button>
                        </form>
                            <a href="{% url 'user_menu' %}"><button class="cancel" style="width: 100%">Cancelar pedido</button></a>
                    </div>
            </div>
        </div>
    </div>
</body>
</html>
