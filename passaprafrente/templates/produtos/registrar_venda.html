{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar produto</title>
    <link rel="stylesheet" href="{% static 'produtos/registrar_venda.css' %}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="image_area">
                <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f" alt="Imagem genérica de um produto">
            </div>
            <div class="info_area">
                <h1>Anunciar Produto</h1>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    {% if form.errors %}
                        {% for field in form %}
                            {% for error in field.errors %}
                                <p style="color:red">{{ error }}</p>
                            {% endfor %}
                        {% endfor %}
                    {% endif %}

                    <label>Título do produto
                        <input type="text" name="nome" placeholder="Ex: Livro de cálculo" required>
                    </label>
                    <label>Preço
                        <input type="number" name="preco" step="0.01" min="0.01" placeholder="R$ 00,00" required>
                    </label>
                    <label>Categoria
                        <select name="categoria">
                            <option value="Eletrônicos">Eletrônicos</option>
                            <option value="Esportes">Esportes</option>
                            <option value="Livros">Livros</option>
                            <option value="Roupas">Roupas</option>
                            <option value="Móveis">Móveis</option>
                            <option value="Comidas">Comidas</option>
                            <option value="Utilidades">Utilidades</option>
                            <option value="Acessórios">Acessórios</option>
                        </select>
                    </label>
                    <label>Descrição
                        <textarea name="descricao" placeholder="Descreva seu produto" required></textarea>
                    </label>
                    <label for="file" class="upload">
                        Adicionar imagem
                        <input
                            type="file" id="file" name="imagens" multiple="multiple" accept="image/*"/>
                    </label>
                    <small>
                        Você pode selecionar várias imagens segurando Ctrl ou selecionando várias de uma vez.
                    </small>
                    <div class="info_area_buttons">
                        <button type="submit" class="post_button">Anunciar produto</button>
                        <button type="button" onclick="window.location.href='{% url 'user_menu' %}'" class="cancel_button">Cancelar anúncio</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
